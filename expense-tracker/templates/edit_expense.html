<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
        <h2 class="text-center mb-4">Edit Expense</h2>

        <form method="POST">
            <input class="form-control mb-3" type="text" name="title" value="{{ expense[2] }}" required>

            <input class="form-control mb-3" type="number" step="0.01" name="amount" value="{{ expense[3] }}" required>

            <select class="form-control mb-3" name="category" required>

    <option value="Food" {% if expense[4]=='Food' %}selected{% endif %}>
        Food
    </option>

    <option value="Travel" {% if expense[4]=='Travel' %}selected{% endif %}>
        Travel
    </option>

    <option value="Shopping" {% if expense[4]=='Shopping' %}selected{% endif %}>
        Shopping
    </option>

    <option value="Bills" {% if expense[4]=='Bills' %}selected{% endif %}>
        Bills
    </option>

    <option value="Entertainment" {% if expense[4]=='Entertainment' %}selected{% endif %}>
        Entertainment
    </option>

</select>

            <input class="form-control mb-3" type="date" name="date" value="{{ expense[5] }}" required>

            <button class="btn btn-warning w-100" type="submit">Update Expense</button>
        </form>
    </div>
</div>

</body>
</html>
