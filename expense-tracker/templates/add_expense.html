<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
        <h2 class="text-center mb-4">Add Expense</h2>

        <form method="POST">
            <input class="form-control mb-3" type="text" name="title" placeholder="Expense Title" required>

            <input class="form-control mb-3" type="number" step="0.01" name="amount" placeholder="Amount" required>

            <select class="form-control mb-3" name="category" required>
    <option value="">Select Category</option>
    <option value="Food">Food</option>
    <option value="Travel">Travel</option>
    <option value="Shopping">Shopping</option>
    <option value="Bills">Bills</option>
    <option value="Entertainment">Entertainment</option>
</select>

            <input class="form-control mb-3" type="date" name="date" required>

            <button class="btn btn-success w-100" type="submit">Add Expense</button>
        </form>
    </div>
</div>

</body>
</html>
